<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appelboom Main Page</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <main class="dashboard">

    <!-- Akker velden -->
    <section class="fields-panel">
      <div class="fields-grid">
        <div class="field-card interactive" data-field="Akker 1">Akker 1</div>
        <div class="field-card interactive" data-field="Akker 2">Akker 2</div>
        <div class="field-card interactive" data-field="Akker 3">Akker 3</div>
        <div class="field-card interactive" data-field="Akker 4">Akker 4</div>
        <div class="field-card interactive" data-field="Akker 5">Akker 5</div>
        <div class="field-card interactive" data-field="Akker 6">Akker 6</div>
      </div>

      <div class="timeline-section">
        <div class="year-labels">
          <span>2010</span>
          <span id="currentYear">2017</span>
          <span>2017</span>
        </div>

        <input
          type="range"
          id="yearSlider"
          min="2010"
          max="2017"
          step="1"
          value="2017"
        />
      </div>
    </section>

    <!-- Boom -->
    <section class="tree-panel">
      <div class="tree-crown">
        <svg id="treeSvg" viewBox="0 0 260 340"></svg>
      </div>
      <div class="tree-trunk"></div>
    </section>


    <!-- Info box links / rechts onder -->
    <section class="bottom-box left-box interactive" id="leftInfoBox">
      <h3>Left info box</h3>
      <p>Information Left info panel.</p>
    </section>

    <section class="bottom-box right-box interactive" id="rightInfoBox">
      <h3>Right info box</h3>
      <p>Information Right info panel.</p>
    </section>

    <!-- Main info panel -->
    <section class="status-box" id="statusBox">
      <h2>Main panel</h2>
      <p>Click op een item om te inspecteren</p>
    </section>

  </main>

  <script src="js/script.js"></script>
</body>
</html>
